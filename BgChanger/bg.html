<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Background changer</title>
    <link rel="stylesheet" href="/src/output.css">
</head>
<body class="bg-slate-100">
    <div class="top-0">
        <div class="max-w-full mx-auto bg-white flex justify-center p-4 gap-7 shadow-2xl">
            <div class="border-2 border-black py-2 rounded-md px-10 cursor-pointer">Home</div>
            <div class="border-2 border-black p-2 rounded-md cursor-pointer">Youtube Channel</div>
        </div>

        <div class="text-center mt-50">
            <h1 class="text-2xl font-bold p-4"id="h1">Color Scheme Switch</h1>
            <div class="max-w-xl mx-auto flex flex-wrap gap-2 ">
                <div class="size-30 border-2 border-black bg-gray-600 button" id="gray"></div>
                <div class="size-30 border-2 border-black bg-white button" id="white"></div>
                <div class="size-30 border-2 border-black bg-blue-500 button" id="blue"></div>
                <div class="size-30 border-2 border-black bg-yellow-400 button" id="yellow"></div>
                <div class="size-30 border-2 border-black bg-purple-400 button" id="purple"></div>
            </div>
            <h1 class="text-2xl font-bold p-4" id="h1">Trying to click the above color to switch the background color of this page</h1>
        </div>
    </div>
    <script src="bg.js"></script>
</body>
</html>
