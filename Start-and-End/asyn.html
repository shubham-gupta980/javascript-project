        let st;

        // Change every second backgroundcolor
        const randomColor = function() {  // generate hex code
            let hex = "0123456789ABCDEF";
            let color = "#";
            for (let i=0; i<6; i++) {
                color += hex[Math.floor(Math.random()*16)];
            }
            return color;
        }
        console.log(randomColor());

        let ch;
        let body = document.querySelector('body');
        document.querySelector('#chnclr').addEventListener('click', function() {
            ch = setInterval(function() {
                body.style.background = randomColor();
            }, 1000)
            
        })
        document.querySelector('#stopclr').addEventListener('click', function() {
            clearInterval(ch);
            ch = null;
            console.log("stopped")
        })
        
        // Keycode using js
        const insert = document.querySelector('#insert');
        window.addEventListener('keydown', (e) => {
            insert.innerHTML = `
            <div class='color'>
                <table border>
                    <tr>
                    <th>key</th>
                    <th>keyCode</th>
                    <th>Code</th>
                    </tr>
                    <tr>
                    <td>${e.key === " "? "Space": e.key}</td>
                    <td>${e.keyCode}</td>
                    <td>${e.code}</td>
                    </tr>
                </table>

                </div>
            `
        })
