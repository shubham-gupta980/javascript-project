<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guess the number</title>
</head>
<body style="background-color: rgb(51, 49, 49); text-align: center; color: aliceblue;">
    <style>
        h2 {
            font-weight: bolder;
            font-size: 35px;
        }
        h1 {
            font-weight: bolder;
            font-size: 60px;
        }
        #guessinput {
            width: 300px;
            padding: 7px 10px;
            outline: none;
            border: 5px solid rgb(142, 139, 139)
        }
        #submit {
            padding: 10px 20px;
            margin-top: 20px;
            border-radius: 10px;
            background-color: black;
            color: rgb(214, 211, 211);
            font-size: 18px;
            font-weight: 400;
            cursor: pointer;
        }
        #prevNum {
            font-size: 20px;
            margin-top: 20px;
        }
        #count {
            font-size: 20px;
            margin-top: 20px;
        }
        #para {
            font-size: 20px;
            margin-top: 20px;
        }
    </style>
    <h2>Number Guessing game</h2>
    <div>
        <p>Try and guess a number between 1 to 100</p>
        <p>You have 10 attemps to guess the right number</p>
    </div>
    <h1>Guess the number</h1>

    <form action="#">
        <div><input id="guessinput" type="text"></div>
        <div><input id="submit" type="submit" value="Submit guess number"></div>
    </form>

    <div id="resultpara">
        <div id="para"></div>
        <p>Previous Guesses: <span id="prevNum"></span></p>
        <p>Guesses remaining: <span id="count">10</span></p>
    </div>
    <script src="guess.js"></script>
</body>
</html>
