<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Calculator</title>
    <link rel="stylesheet" href="bmi.css">
</head>
<body>
    <nav>
        <a href="/" aria-current="page">Home</a>
        <a href="https://www.youtube.com/watch?v=EGqHVjU-fas&t=734s" target="_blank">Youtube</a>
    </nav>
    <div class="container">
        BMI Calculator
    </div>

    <form action="#">
        <label>Height in CM:- <input type="text" id="height"></label>
        <br>
        <label>Weight in Kg:- <input type="text" id="weight"></label>
        <br>
        <button>Calculate</button>
        <div id="result"></div>
        <div id="result1"></div>
        <div>
            <h2 id="weight-guide">BMI weight guide</h2>
            <p>Under weight: less than 18.6</p>
            <p>NormalRange: 18.6 to 24.9</p>
            <p>Over weight: Greater than 24.9</p>
        </div>
    </form>
    <script>
        let form = document.querySelector('form');
        // let height = parseInt(document.querySelector('#height').value)
        // this useCase will give you empty value
        form.addEventListener('submit',  function(e) {
            e.preventDefault();
            let height = parseInt(document.querySelector('#height').value)
            let weight = parseInt(document.querySelector('#weight').value)
            let result = document.querySelector('#result');
            let result1 = document.querySelector('#result1');

            if (height === '' || height < 0 || isNaN(height)) {
                result.innerHTML = `Please give me a valid height ${height}`;
            }

            else if(weight === '' || weight < 0 || isNaN(weight)) {
                result.innerHTML = `Please give me a valid height ${weight}`;
            }
            else {
                let final =(weight / ((height*height) /10000)).toFixed(2);
                console.log(final);
                result.innerHTML = `<span>${final}</span>`;
                if (final <=18.6) {
                    result1.innerHTML = 'Underweight'
                }
                else if (final > 18.6 && final <=24.8) {
                    result1.innerHTML = 'NormalWeight'
                }
                else {
                    result1.innerHTML = 'Overweight'
                }
            }
        })
    </script>
</body>
</html>
